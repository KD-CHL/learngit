<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理面板 · Git 闯关练习</title>
<link rel="stylesheet" href="./css/auth.css">
</head>
<body>
<div class="admin-page">

  <div class="admin-bar">
    <div class="logo"><span class="mark">⎇</span> Git 闯关练习</div>
    <span class="badge-admin">管理面板</span>
    <div class="spacer"></div>
    <span class="who">👤 <b id="adminName">—</b></span>
    <button class="bar-btn" onclick="location.href='./index.html'">🎮 进入游戏</button>
    <button class="bar-btn" onclick="adminLogout()">退出登录</button>
  </div>

  <div class="admin-body">
    <h1>用户与进度总览</h1>
    <p class="sub">查看每位玩家的闯关进度，管理角色权限（管理员 / 玩家）</p>

    <div id="stats"></div>

    <div class="users-card">
      <table>
        <thead>
          <tr>
            <th>用户名</th><th>角色</th><th>已通关</th><th>星星</th><th>完成度</th><th>命令数</th><th>注册日期</th><th>操作</th>
          </tr>
        </thead>
        <tbody id="userRows">
          <tr><td colspan="8" class="empty">加载中…</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>
<script type="module" src="./js/admin.js"></script>
</body>
</html>
