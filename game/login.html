<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 · Git 闯关练习</title>
<link rel="stylesheet" href="./css/auth.css">
</head>
<body>
<div class="auth-wrap">

  <!-- 左侧品牌区 -->
  <div class="brand">
    <div>
      <a class="logo" href="./index.html"><span class="mark">⎇</span> Git 闯关练习</a>
      <div class="tagline">LEARN GIT BY DOING · 像玩游戏一样学会 Git</div>
    </div>
    <div class="commit-chain" id="commitChain"></div>
    <div class="foot">
      <a href="../README.md">关于项目</a>
      <a href="./index.html">返回游戏</a>
    </div>
    <div class="blob b1"></div>
    <div class="blob b2"></div>
  </div>

  <!-- 右侧表单区 -->
  <div class="form-side">
    <div class="form-card">
      <div class="mobile-logo"><span class="mark">⎇</span> Git 闯关练习</div>

      <h1>欢迎回来！</h1>
      <p class="sub">登录后继续你的 Git 闯关之旅</p>

      <form id="authForm" novalidate>
        <div class="field">
          <label for="username">用户名</label>
          <div class="input-box">
            <input id="username" type="text" placeholder="输入用户名" autocomplete="username">
          </div>
          <div class="f-err"></div>
        </div>

        <div class="field">
          <label for="password">密码</label>
          <div class="input-box">
            <input id="password" type="password" placeholder="••••••••" autocomplete="current-password">
            <button type="button" class="toggle-eye" id="eyeBtn" title="显示/隐藏密码">👁</button>
          </div>
          <div class="f-err"></div>
        </div>

        <div class="row-between">
          <label class="remember"><input type="checkbox" checked> 记住我</label>
        </div>

        <div class="alert" id="alert"></div>

        <button class="btn-primary" id="submitBtn" type="submit">登 录</button>
      </form>

      <div class="divider"><span>或</span></div>
      <button class="btn-github" id="githubBtn" type="button" style="display:none" onclick="githubLogin()">
        <svg viewBox="0 0 16 16" width="18" height="18" fill="currentColor" aria-hidden="true">
          <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
        </svg>
        使用 GitHub 登录
      </button>

      <div class="switch-line">还没有账号？<a href="./signup.html">立即注册</a></div>
      <div class="demo-hint">默认管理员：admin / admin123</div>
    </div>
  </div>

</div>
<script type="module">
  import { initAuthPage } from './js/authpage.js';
  initAuthPage('login');
</script>
</body>
</html>
