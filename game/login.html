<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 · Git 闯关练习</title>
<link rel="stylesheet" href="./css/auth.css">
</head>
<body>
<div class="auth-wrap">

  <!-- 左侧品牌区 -->
  <div class="brand">
    <div>
      <a class="logo" href="./index.html"><span class="mark">⎇</span> Git 闯关练习</a>
      <div class="tagline">LEARN GIT BY DOING · 像玩游戏一样学会 Git</div>
    </div>
    <div class="commit-chain" id="commitChain"></div>
    <div class="foot">
      <a href="../README.md">关于项目</a>
      <a href="./index.html">返回游戏</a>
    </div>
    <div class="blob b1"></div>
    <div class="blob b2"></div>
  </div>

  <!-- 右侧表单区 -->
  <div class="form-side">
    <div class="form-card">
      <div class="mobile-logo"><span class="mark">⎇</span> Git 闯关练习</div>

      <h1>欢迎回来！</h1>
      <p class="sub">登录后继续你的 Git 闯关之旅</p>

      <form id="authForm" novalidate>
        <div class="field">
          <label for="username">用户名</label>
          <div class="input-box">
            <input id="username" type="text" placeholder="输入用户名" autocomplete="username">
          </div>
          <div class="f-err"></div>
        </div>

        <div class="field">
          <label for="password">密码</label>
          <div class="input-box">
            <input id="password" type="password" placeholder="••••••••" autocomplete="current-password">
            <button type="button" class="toggle-eye" id="eyeBtn" title="显示/隐藏密码">👁</button>
          </div>
          <div class="f-err"></div>
        </div>

        <div class="row-between">
          <label class="remember"><input type="checkbox" checked> 记住我</label>
        </div>

        <div class="alert" id="alert"></div>

        <button class="btn-primary" id="submitBtn" type="submit">登 录</button>
      </form>

      <div class="switch-line">还没有账号？<a href="./signup.html">立即注册</a></div>
      <div class="demo-hint">默认管理员：admin / admin123</div>
    </div>
  </div>

</div>
<script type="module">
  import { initAuthPage } from './js/authpage.js';
  initAuthPage('login');
</script>
</body>
</html>
