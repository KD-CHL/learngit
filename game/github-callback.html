<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub 登录 · Git 闯关练习</title>
<link rel="stylesheet" href="./css/auth.css">
</head>
<body>
<div class="auth-wrap">
  <div class="brand">
    <div>
      <a class="logo" href="./index.html"><span class="mark">⎇</span> Git 闯关练习</a>
      <div class="tagline">LEARN GIT BY DOING · 像玩游戏一样学会 Git</div>
    </div>
    <div class="foot">
      <a href="./login.html">返回登录</a>
    </div>
    <div class="blob b1"></div>
    <div class="blob b2"></div>
  </div>

  <div class="form-side">
    <div class="form-card gh-callback">
      <div class="mobile-logo"><span class="mark">⎇</span> Git 闯关练习</div>
      <div class="gh-spinner" id="ghSpinner">⏳</div>
      <h1 id="ghTitle">正在通过 GitHub 登录…</h1>
      <p class="sub" id="ghMsg">请稍候，正在用授权码换取登录凭证</p>
      <div class="alert" id="ghAlert"></div>
      <a class="btn-primary gh-back" id="ghBack" href="./login.html" style="display:none">返回登录</a>
    </div>
  </div>
</div>
<script type="module" src="./js/github-callback.js"></script>
</body>
</html>
